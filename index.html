<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在庫メモアプリ</title>
    <style>
      :root {
        --bg: #fff7fb;
        --card: #ffffff;
        --mint: #d8f7ef;
        --lavender: #ece5ff;
        --pink: #ffdff0;
        --text: #5b4b6d;
        --muted: #8a7f9f;
        --danger: #ff7da4;
        --shadow: 0 10px 24px rgba(173, 148, 201, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "M PLUS Rounded 1c", "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, var(--lavender), transparent 45%),
          radial-gradient(circle at top right, var(--mint), transparent 40%), var(--bg);
      }

      .container {
        width: min(920px, 92vw);
        margin: 2rem auto 3rem;
      }

      .title-card,
      .form-card,
      .list-card {
        background: var(--card);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 1.25rem;
      }

      .title-card {
        background: linear-gradient(135deg, #ffe9f5, #e9f2ff);
        text-align: center;
        margin-bottom: 1rem;
      }

      h1 {
        margin: 0;
        font-size: 1.8rem;
      }

      p {
        margin: 0.5rem 0 0;
        color: var(--muted);
      }

      .form-card {
        margin-bottom: 1rem;
      }

      .input-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.8rem;
      }

      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 0.3rem;
      }

      input {
        width: 100%;
        border: 2px solid #efe8ff;
        border-radius: 14px;
        padding: 0.65rem 0.8rem;
        font-size: 1rem;
        color: var(--text);
        background: #fff;
      }

      input:focus {
        outline: none;
        border-color: #cdbdff;
        box-shadow: 0 0 0 3px rgba(205, 189, 255, 0.3);
      }

      .actions {
        margin-top: 1rem;
        display: flex;
        justify-content: flex-end;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.65rem 1.1rem;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
      }

      .add-btn {
        background: linear-gradient(135deg, #b6f5de, #c6ddff);
        color: #433656;
      }

      .list-card h2 {
        margin: 0 0 0.8rem;
        font-size: 1.2rem;
      }

      .empty {
        text-align: center;
        color: var(--muted);
        margin: 0.4rem 0 0;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.75rem;
      }

      .item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fff9fe;
        border: 1px solid #f2eaff;
        border-radius: 16px;
        padding: 0.75rem 0.9rem;
      }

      .item strong {
        display: block;
      }

      .meta {
        margin-top: 0.25rem;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .delete-btn {
        background: var(--pink);
        color: #7a3350;
      }

      @media (max-width: 720px) {
        .input-grid {
          grid-template-columns: 1fr;
        }

        .item {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="title-card">
        <h1>🧁 在庫メモアプリ</h1>
        <p>商品名・在庫数・価格をサクッとメモして管理できます。</p>
      </section>

      <section class="form-card">
        <form id="item-form">
          <div class="input-grid">
            <div>
              <label for="name">商品名</label>
              <input id="name" name="name" type="text" required placeholder="例: いちごジャム" />
            </div>
            <div>
              <label for="stock">在庫数</label>
              <input id="stock" name="stock" type="number" min="0" required placeholder="例: 12" />
            </div>
            <div>
              <label for="price">価格 (円)</label>
              <input id="price" name="price" type="number" min="0" required placeholder="例: 580" />
            </div>
          </div>
          <div class="actions">
            <button class="add-btn" type="submit">追加する</button>
          </div>
        </form>
      </section>

      <section class="list-card">
        <h2>在庫一覧</h2>
        <p id="empty" class="empty">まだ商品がありません。上のフォームから追加しましょう。</p>
        <ul id="item-list"></ul>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "stockMemoItems";
      const form = document.getElementById("item-form");
      const itemList = document.getElementById("item-list");
      const emptyMessage = document.getElementById("empty");

      const loadItems = () => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      };

      let items = loadItems();

      const saveItems = () => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      };

      const formatPrice = (price) => `${Number(price).toLocaleString("ja-JP")} 円`;

      const render = () => {
        itemList.innerHTML = "";

        if (items.length === 0) {
          emptyMessage.style.display = "block";
          return;
        }

        emptyMessage.style.display = "none";

        items.forEach((item) => {
          const li = document.createElement("li");
          li.className = "item";

          li.innerHTML = `
            <div>
              <strong>${item.name}</strong>
              <div class="meta">在庫: ${item.stock} / 価格: ${formatPrice(item.price)}</div>
            </div>
            <button class="delete-btn" type="button" data-id="${item.id}">削除</button>
          `;

          itemList.appendChild(li);
        });
      };

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const name = form.name.value.trim();
        const stock = form.stock.value;
        const price = form.price.value;

        if (!name || stock === "" || price === "") {
          return;
        }

        items.push({
          id: Date.now().toString(36),
          name,
          stock: Number(stock),
          price: Number(price),
        });

        saveItems();
        render();
        form.reset();
        form.name.focus();
      });

      itemList.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) {
          return;
        }

        const { id } = target.dataset;
        if (!id) {
          return;
        }

        items = items.filter((item) => item.id !== id);
        saveItems();
        render();
      });

      render();
    </script>
  </body>
</html>
